[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcs-driver-clock"
version = "0.1.0"
description = "MCS ToolDriver returning the current wall-clock time (UTC + optional IANA timezone)."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Danny Gerst", email = "d.gerst@bizrock.de" }]
keywords = ["mcs", "mcs-driver", "clock", "time", "llm", "function-calling"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "mcs-driver-core>=0.2",
    # ``zoneinfo`` (PEP 615) consults the OS IANA database first;
    # Windows ships none, so pull the pure-Python ``tzdata`` package
    # as a fallback. POSIX systems with /usr/share/zoneinfo present
    # silently skip it.
    "tzdata>=2024.1",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["mcs*"]
namespaces = true
