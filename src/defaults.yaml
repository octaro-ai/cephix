# Cephix factory defaults.
#
# This file ships with the package and is copied to ~/.cephix/cephix.yaml on
# first run. Update-resistance is intentional: editing the user copy keeps
# your configuration stable across cephix upgrades. To pick up new factory
# defaults from a newer version, delete ~/.cephix/cephix.yaml and let cephix
# re-roll it.
#
# Per-bot overrides live in ~/.cephix/robots/<id>/robot.yaml.

defaults:
  bus:
    type: asyncio
  # Out-of-band maintenance hatch. Not connected to the bus -- if the
  # bus wedges, the control plane is still reachable so an operator
  # can inspect and stop the robot. Token is taken from the bot-local
  # .env file (key: CEPHIX_CONTROL_PLANE_TOKEN).
  control_plane:
    enabled: true
    host: 127.0.0.1
    port: 9876
    # Tried in order if `port` is busy; final fallback is port 0
    # (let the OS pick) so multiple bots co-exist by default.
    port_range: [9876, 9999]
    path: /control
  kernel:
    type: echo
    input_topic: input.message
    output_topic: output.message
    prefix: "echo: "
  channels:
    - type: websocket
      host: 127.0.0.1
      port: 8765
      path: /ws
  # Robot-wide persistence layer. Components ask for sinks by channel
  # name (e.g. "telemetry", "audit", later "memory"); the provider
  # decides how each channel lands. Default: one .jsonl file per
  # channel inside the bot's `logs/` directory, alongside the
  # operational console log (`logs/cephix.log`). Set `enabled: false`
  # to turn the whole layer off; replace `type:` with another backend
  # (sqlite, supabase, ...) once those exist. Channel names with a
  # slash become subdirectories on disk -- handy once rotation or
  # per-run sharding lands (e.g. `telemetry/2026-05-26`).
  persistence:
    enabled: true
    type: jsonl
    path: logs      # relative paths anchor on the workspace; absolute paths win.
  # Cross-cutting observers. Both default to on; the channel name
  # selects which file/table/row inside the persistence layer is
  # written.
  telemetry:
    enabled: true
    type: bus_recorder
    channel: telemetry
  audit:
    enabled: true
    type: audit_note_sink
    channel: audit

# Optional list of bots whose workspace lives outside the convention
# (~/.cephix/robots/<id>/). Bots inside the convention are auto-discovered
# and do NOT need an entry here.
#
# Example:
#   robots:
#     - id: dreamgirl
#       workspace: D:/special/dreamgirl
robots: []
