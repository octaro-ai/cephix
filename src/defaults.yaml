# Cephix factory defaults.
#
# This file ships with the package and is copied to ~/.cephix/cephix.yaml on
# first run. Update-resistance is intentional: editing the user copy keeps
# your configuration stable across cephix upgrades. To pick up new factory
# defaults from a newer version, delete ~/.cephix/cephix.yaml and let cephix
# re-roll it.
#
# Per-bot overrides live in ~/.cephix/robots/<id>/robot.yaml.
#
# How the three-stage resolution works
# ------------------------------------
# A robot's configuration is built in three layers, in this order:
#
#   1. TEMPLATE      A robot.yaml with `template: <name>` selects a named
#                    blueprint from `defaults.templates`. The blueprint
#                    declares which slots the robot has (bus, kernel,
#                    persistence, ...) and the default `name:` for each.
#                    Without `template:` no template layer is applied --
#                    the robot.yaml must declare every slot it wants.
#
#   2. INSTANCE      The robot.yaml itself overrides slots on the template.
#                    Slot-by-slot semantics:
#                      * `<slot>: null` removes the slot entirely;
#                      * a different `name:` replaces the slot wholesale
#                        (no field bleed from the previous component);
#                      * the same `name:` (or no `name:`) merges fields,
#                        with the instance winning per field.
#
#   3. LIBRARY       Each remaining component is filled with its default
#                    fields from `defaults.components.<category>` indexed
#                    by `name:`. Explicit fields always win.
#
# Vocabulary: every component block carries a `name:` discriminator that
# selects the registered implementation in that block's role/category
# (the *type* in the OO sense is the class itself; `name:` says *which*
# implementation by short identifier). Builder/registry resolve the name
# to a class and pass the remaining fields as constructor kwargs.

defaults:

  # --------------------------------------------------------------------
  # Templates: named robot blueprints. A robot.yaml references one with
  # `template: <name>`; if the robot.yaml does not name a template, no
  # template layer is applied and the robot.yaml must declare every slot
  # it wants.
  # --------------------------------------------------------------------
  templates:

    # The standard cephix robot: bus + kernel + echo actor + WebSocket
    # channel + the full observability stack (persistence, telemetry,
    # audit, control_plane).
    default:
      bus: {name: asyncio}
      # Single persistence provider; observers (telemetry, audit) pick
      # it up automatically as the default. To run multiple providers
      # (filesystem + DB / Supabase), declare a list with explicit
      # ``id:`` values and reference one via ``persistence: <id>`` on
      # the observer entry.
      persistence:
        - {name: filesystem-events}
      telemetry:
        - {name: bus_recorder}
      audit:
        - {name: audit_note_sink}
      control_plane: {name: control_plane}
      kernel:
        name: base
        actor: {name: echo}
      channels:
        - {name: websocket}

    # Minimal robot for tests and lightweight bots: bus + kernel + echo,
    # nothing else. Set `template: bare` if you do not want the
    # observability stack.
    bare:
      bus: {name: asyncio}
      kernel:
        name: base
        actor: {name: echo}

    # Blueprint for LLM-driven bots. Same observability as `default`,
    # but the kernel is `chat` (firmware-backed system prompt, OCF-
    # shaped persistent session history) and the actor is
    # `llm.openai` (the robot.yaml supplies model_id and api_key).
    # The three utilities (model catalog, firmware store, session
    # store) are wired by convention from the `utility:` list.
    chatbot:
      bus: {name: asyncio}
      persistence:
        - {name: filesystem-events}
      telemetry:
        - {name: bus_recorder}
        # Boots at the telemetry level so it is subscribed before any
        # component announces capabilities (subscribe_all does not
        # replay retained events). Aggregates the commands every
        # component self-announces into the retained harness.capabilities
        # manifest, so channels/UIs render a failsafe, dynamic surface.
        - {name: capability-collector}
      audit:
        - {name: audit_note_sink}
      control_plane: {name: control_plane}
      utility:
        - {name: model-catalog}
        - {name: firmware-store}
        - {name: session-store}
        - {name: config-store}
      # Bus-attached MCS tool execution layer. Hosts ToolDrivers and
      # routes ``tool.invoke`` requests. A FilesystemConnection rooted
      # at the bot's <robot_home>/workspace/ sandbox is auto-injected,
      # so the upstream ``mcs-driver-filesystem`` driver lights up
      # automatically -- scoped to the workspace, away from the bot's
      # machinery (logs, secrets, firmware).
      bus_provider:
        - {name: tool-execution}
      kernel:
        name: chat
        actor: {name: llm.openai}
      channels:
        - {name: websocket}

  # --------------------------------------------------------------------
  # Component library: default fields per (category, name). Consulted
  # by the builder after the template/instance merge to fill missing
  # constructor kwargs. Explicitly set fields always win.
  # --------------------------------------------------------------------
  components:

    bus:
      - {name: asyncio}

    kernel:
      - name: base
        input_topic: input.message
        output_topic: output.message
        actor_timeout: 30.0
      - name: chat
        input_topic: input.message
        output_topic: output.message
        actor_timeout: 30.0

    actor:
      - {name: echo, prefix: "echo: "}
      - {name: llm.openai, provider: openai, timeout: 60.0, max_retries: 2}

    utility:
      # Off-bus helpers consumed by reference by other components.
      # The model catalog ships its bundled `llmprice` snapshot;
      # the markdown firmware store reads <robot_home>/firmware/;
      # the session store routes through the default persistence
      # connection and writes to its own bucket below the connection
      # root (default <connection-root>/sessions/). Override
      # ``directory:`` to relocate the bucket; override
      # ``persistence: <id>`` to bind to a non-default persistence
      # stack when several are declared.
      - {name: model-catalog}
      - {name: firmware-store, directory: firmware}
      - {name: session-store, directory: sessions}
      # Config store reads user-editable YAML lists from
      # <connection-root>/configs/ (e.g. heartbeats.yaml). The
      # heartbeat channel picks it up via Convention-DI.
      - {name: config-store, directory: configs}

    channel:
      - name: websocket
        host: 127.0.0.1
        port: 8765
        # Tried in order if `port` is busy; final fallback is port 0
        # (let the OS pick) so multiple bots co-exist by default.
        port_range: [8765, 8799]
        path: /ws
      # Heartbeat: cron-scheduled, fire-and-forget. Schedule list
      # is loaded from the config-store at boot
      # (<robot_home>/configs/heartbeats.yaml -- a bare YAML list).
      # ``default_principal`` is the attribution used for every
      # emitted event whose entry does not override
      # ``emit.principal``.
      - name: heartbeat
        default_principal: "robot:heartbeat"

    persistence:
      # Robot-wide persistence layer. Three components per entry --
      # backend adapter (level 0), filesystem connection (level 1),
      # event-stream provider (level 2) -- synthesized by the builder
      # from a single line. The connection root defaults to the
      # robot home; the provider writes its channels under the
      # `directory:` subdir (default `logs/`) so a fresh robot home
      # ends up with <robot_home>/logs/telemetry.jsonl,
      # <robot_home>/logs/audit.jsonl, while sibling utilities like
      # the session store keep their own bucket
      # (<robot_home>/sessions/). Override `path:` to anchor the
      # connection elsewhere (relative -> robot home, absolute as-is);
      # override `adapter:` to swap the backend (future: `s3-fs`, ...).
      #
      # NOTE: this is the bot's machinery root, NOT the filesystem-tool
      # sandbox. The LLM's file tools are rooted at the separate
      # <robot_home>/workspace/ sub-directory (see tool-execution).
      # Records are written as JSONL inline.
      - {name: filesystem-events, directory: logs, adapter: local-fs}

    telemetry:
      - {name: bus_recorder, channel: telemetry}
      # Read-mostly observer that boots at the telemetry level. Builds
      # the retained harness.capabilities manifest from the commands
      # components self-announce. Needs no persistence sink.
      - {name: capability-collector}

    audit:
      - {name: audit_note_sink, channel: audit}

    control_plane:
      # Out-of-band maintenance hatch. Not connected to the bus -- if
      # the bus wedges, the control plane is still reachable so an
      # operator can inspect and stop the robot. Token comes from the
      # bot-local .env (key: CEPHIX_CONTROL_PLANE_TOKEN).
      - name: control_plane
        host: 127.0.0.1
        port: 9876
        # Tried in order if `port` is busy; final fallback is port 0
        # (let the OS pick) so multiple bots co-exist by default. Same
        # mechanic as the websocket channel above.
        port_range: [9876, 9999]
        path: /control

# Optional list of bots whose robot home lives outside the convention
# (~/.cephix/robots/<id>/). Bots inside the convention are auto-discovered
# and do NOT need an entry here.
#
# Example:
#   robots:
#     - id: dreamgirl
#       home: D:/special/dreamgirl   # legacy key `workspace:` still read
robots: []
