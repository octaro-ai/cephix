site_name: Cephix
site_description: Digital robot prototype with a semantic bus and deterministic kernel.
site_url: https://cephix.example.com
repo_url: https://github.com/your-org/cephix
repo_name: cephix
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - panzoom:
      mermaid: true
      full_screen: true
      hint_location: bottom
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google
            heading_level: 2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Current State: state.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Project Layout: getting-started/project-layout.md
  - Concepts:
      - Harness Model: concepts/harness-model.md
      - Runtime Lifecycle: concepts/runtime-lifecycle.md
      - Memory: concepts/memory.md
      - Notebooks: concepts/notebooks.md
      - SOPs: concepts/sops.md
      - Governance & Approvals: concepts/governance.md
      - "Tools, Skills & Toolbuilder": concepts/toolbuilder.md
  - Architecture:
      - "Robot OS (Target)": architecture/robot-os-target.md
      - Overview: architecture/overview.md
      - Diagrams: architecture/diagrams.md
      - Code Map: architecture/code-map.md
      - Run Flow (Detailed): architecture/run-flow.md
      - Decisions (ADR):
          - Overview: adr/index.md
          - "0001 — Use MkDocs Material": adr/0001-use-mkdocs-material.md
          - "0002 — Mermaid + C4 via Structurizr": adr/0002-diagrams-mermaid-and-c4.md
  - Project:
      - Status: project/status.md
      - Roadmap: project/roadmap.md
      - Changelog: project/changelog.md
  - Reference:
      - Configuration: reference/configuration.md
      - CLI: reference/cli.md
      - WebSocket & Control Plane: reference/websocket.md
      - Glossary: reference/glossary.md
      - External References: reference/external-references.md
      - API: reference/api.md
